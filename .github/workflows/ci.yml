name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven
        
    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
        
    - name: Run tests
      env:
        # Cookie должна быть установлена как секрет в настройках репозитория
        # Settings -> Secrets and variables -> Actions -> New repository secret
        cookie: ${{ secrets.COOKIE }}
        baseUrl: ${{ secrets.BASE_URL || 'https://dev6-dtw.mos.ru' }}
      run: mvn clean test
      continue-on-error: false
      
    - name: Generate Allure Report
      if: always()
      uses: simple-elf/allure-report-action@master
      with:
        allure_results: target/allure-results
        allure_history: allure-history
        keep_reports: 20
      continue-on-error: true
      
    - name: Upload Allure Report as Artifact
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: allure-report
        path: allure-history
        retention-days: 30
        if-no-files-found: ignore
        
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results
        path: |
          target/surefire-reports/
          target/allure-results/
        retention-days: 7
        if-no-files-found: ignore

  security-check:
    name: Security Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Check for sensitive data in code
      run: |
        echo "Проверка на наличие чувствительных данных в коде..."
        # Проверяем что нет хардкоженных кук или токенов
        if grep -r "cookie.*=.*['\"].*[a-zA-Z0-9]{20,}" src/ --include="*.java" 2>/dev/null; then
          echo "⚠️ ВНИМАНИЕ: Обнаружены возможные хардкоженные куки в коде!"
          exit 1
        fi
        echo "✅ Проверка пройдена: чувствительные данные не найдены в коде"
        
    - name: Verify .gitignore includes target/
      run: |
        if ! grep -q "target/" .gitignore 2>/dev/null; then
          echo "⚠️ ВНИМАНИЕ: target/ не добавлен в .gitignore!"
          exit 1
        fi
        if ! grep -q "allure-results/" .gitignore 2>/dev/null; then
          echo "⚠️ ВНИМАНИЕ: allure-results/ не добавлен в .gitignore!"
          exit 1
        fi
        echo "✅ .gitignore настроен правильно"
